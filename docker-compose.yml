version: '3.8'

services:
  # --- 1. Nginx Proxy (The Gateway) ---
  nginx_proxy:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - monitoring
    depends_on:
      - grafana
      - prometheus

  # --- 2. Grafana (Dashboard) ---
  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    environment:
      - GF_SERVER_DOMAIN=34.244.153.125
      - GF_SERVER_ROOT_URL=http://34.244.153.125/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - monitoring

  # --- 3. Prometheus (Metrics DB) ---
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=http://34.244.153.125/prometheus/'
      - '--web.route-prefix=/'
    networks:
      - monitoring

  # --- 4. Node Exporter (Server Metrics) ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

  # --- 5. Loki (Logs DB) ---
  loki:
    image: grafana/loki:2.8.2
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  # --- 6. Promtail (Log Collector) ---
  promtail:
    image: grafana/promtail:2.8.2
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
